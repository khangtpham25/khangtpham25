name: Update README cards

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 0 * * *" # Runs once daily at midnight
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Generate stats card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true
          path: profile/stats.svg
          token: ${{ secrets.GH_STATS }}

    #   - name: Generate top languages card
    #     uses: stats-organization/github-readme-stats-action@v2
    #     with:
    #       card: top-langs
    #       options: username=${{ github.repository_owner }}&layout=compact&langs_count=6&show_icons=true&theme=transparent&size_weight=0&count_weight=5
    #       path: profile/top-langs.svg
    #       token: ${{ secrets.GH_STATS }}

    #   - name: Generate pin card
    #     uses: stats-organization/github-readme-stats-action@v2
    #     with:
    #       card: pin
        #   options: username=${{ github.repository_owner }}&repo=YOUR-REPO-NAME&theme=transparent
    #       path: profile/pin-stats-organization-github-readme-stats.svg
    #       token: ${{ secrets.GH_STATS }}

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update README cards" || exit 0
          git push
